name: CI

on:
  push:
    branches:
      - master

jobs:
  checks:
    name: Run checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Run Biome lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check
